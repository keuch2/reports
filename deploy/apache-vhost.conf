# Apache vhost — Mister Co. Reports (producción)
# ----------------------------------------------------------------------------
# Subí este archivo a /etc/apache2/sites-available/reports.conf
# y activalo con:   sudo a2ensite reports && sudo systemctl reload apache2
#
# Asumimos:
#   - Servidor: Ubuntu 22.04 con Apache 2.4 + libapache2-mod-php8.3
#   - App en:    /var/www/reports
#   - Dominio:   reports.mister.com.py (ajustá las dos referencias abajo)
#   - SSL via Let's Encrypt: certbot configurará el bloque :443 automáticamente
#     ejecutando: sudo certbot --apache -d reports.mister.com.py
#
# Módulos requeridos (habilitalos una vez):
#   sudo a2enmod rewrite headers ssl http2
# ----------------------------------------------------------------------------

# ----- HTTP :80 → redirect a HTTPS -----
<VirtualHost *:80>
    ServerName reports.mister.com.py
    DocumentRoot /var/www/reports/public

    # Mantenemos el well-known de Let's Encrypt sin redirigir.
    Alias /.well-known/acme-challenge/ /var/www/letsencrypt/.well-known/acme-challenge/
    <Directory /var/www/letsencrypt/>
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

# ----- HTTPS :443 (certbot adapta esto automáticamente) -----
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName reports.mister.com.py
    ServerAdmin admin@mister.com.py
    DocumentRoot /var/www/reports/public

    # HTTP/2 mejora latencia con muchos assets pequeños.
    Protocols h2 http/1.1

    # ===== App =====
    <Directory /var/www/reports/public>
        Options -Indexes +FollowSymLinks
        AllowOverride FileInfo Options
        Require all granted

        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ index.php [L]
    </Directory>

    # Bloquear acceso directo a directorios de aplicación (defensa en profundidad).
    <DirectoryMatch "^/var/www/reports/(src|config|database|storage|templates|vendor|bin|deploy)/">
        Require all denied
    </DirectoryMatch>

    # Bloquear cualquier archivo dotfile.
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # ===== Cabeceras de seguridad =====
    # La app también las inyecta vía PHP (defensa en profundidad: las repetimos acá
    # para responses que no pasen por el front controller, ej. 404 de Apache).
    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-Frame-Options "DENY"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        Header always set Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()"
        # Quitar header que delata Apache + versión.
        Header unset Server
        Header unset X-Powered-By
    </IfModule>

    # Caché agresivo para assets estáticos versionados.
    <FilesMatch "\.(css|js|svg|png|jpg|jpeg|woff2)$">
        <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=2592000, immutable"
        </IfModule>
    </FilesMatch>

    # ===== Logs =====
    ErrorLog ${APACHE_LOG_DIR}/reports-error.log
    CustomLog ${APACHE_LOG_DIR}/reports-access.log combined

    # ===== SSL — certbot completa estas líneas tras ejecutar `certbot --apache` =====
    # SSLCertificateFile      /etc/letsencrypt/live/reports.mister.com.py/fullchain.pem
    # SSLCertificateKeyFile   /etc/letsencrypt/live/reports.mister.com.py/privkey.pem
    # Include                 /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
